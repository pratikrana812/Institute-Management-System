<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Fees - Institute Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>InstiManage</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i>📊</i> Dashboard</a></li>
                <li><a href="students.html"><i>👩‍🎓</i> Students</a></li>
                <li><a href="fees.html" class="active"><i>💳</i> Fees</a></li>
                <li><a href="attendance.html"><i>📅</i> Attendance</a></li>
                <li><a href="exams.html"><i>📝</i> Exams</a></li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h2>Fees Management</h2>
                </div>
                <div class="header-user">
                    <span id="adminName"></span>
                    <button class="logout-btn" onclick="Auth.logout()">Logout</button>
                </div>
            </header>

            <div class="card">
                <div class="card-header">
                    <h3>Fee Structures</h3>
                    <button class="btn btn-primary" onclick="openPaymentModal()" style="width:auto">Record Payment</button>
                </div>
                <div class="table-responsive">
                    <table id="feesTable">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Class</th>
                                <th>Total Fee ($)</th>
                                <th>Paid ($)</th>
                                <th>Status</th>
                                <th>Last Payment</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="6" align="center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Record Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePaymentModal()">&times;</span>
            <h3 style="margin-bottom:20px;">Record Fee Payment</h3>
            <form id="paymentForm">
                <div class="form-group">
                    <label>Select Fee Record (Student name - Due amount)</label>
                    <select id="fee_record_id" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>Amount to Pay ($)</label>
                    <input type="number" step="0.01" id="pay_amount" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Process Payment</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script>
        const user = Auth.check();
        document.getElementById('adminName').textContent = user.username;

        const modal = document.getElementById('paymentModal');
        const form = document.getElementById('paymentForm');

        let currentFees = [];

        function openPaymentModal() {
            const select = document.getElementById('fee_record_id');
            select.innerHTML = '<option value="">Select a record...</option>';
            currentFees.forEach(fee => {
                const due = fee.total_amount - fee.paid_amount;
                if(due > 0) {
                    select.innerHTML += `<option value="${fee.fee_id}">${fee.student_name} (${fee.class}) - Due: $${due.toFixed(2)}</option>`;
                }
            });
            form.reset();
            modal.classList.add('active');
        }

        function closePaymentModal() {
            modal.classList.remove('active');
        }

        async function loadFees() {
            try {
                currentFees = await Fees.getAll();
                const tbody = document.querySelector('#feesTable tbody');
                tbody.innerHTML = '';
                
                if (currentFees.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" align="center">No fee records found. Students need fee structures assigned.</td></tr>';
                } else {
                    currentFees.forEach(fee => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${fee.student_name}</strong></td>
                            <td>${fee.class}</td>
                            <td>$${fee.total_amount.toFixed(2)}</td>
                            <td>$${fee.paid_amount.toFixed(2)}</td>
                            <td><span class="badge badge-${fee.status}">${fee.status.toUpperCase()}</span></td>
                            <td>${fee.last_payment_date || 'N/A'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error("Failed to load fees", error);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fee_id = document.getElementById('fee_record_id').value;
            const amount = document.getElementById('pay_amount').value;

            try {
                await Fees.pay(fee_id, amount);
                closePaymentModal();
                loadFees();
            } catch (error) {
                alert(error.message);
            }
        });

        loadFees();
    </script>
</body>
</html>
