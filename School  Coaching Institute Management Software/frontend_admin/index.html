<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Institute Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>InstiManage</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html" class="active"><i>📊</i> Dashboard</a></li>
                <li><a href="students.html"><i>👩‍🎓</i> Students</a></li>
                <li><a href="fees.html"><i>💳</i> Fees</a></li>
                <li><a href="attendance.html"><i>📅</i> Attendance</a></li>
                <li><a href="exams.html"><i>📝</i> Exams</a></li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-title">
                    <h2>Dashboard Overview</h2>
                </div>
                <div class="header-user">
                    <span id="adminName">Loading...</span>
                    <button class="logout-btn" onclick="Auth.logout()">Logout</button>
                </div>
            </header>

            <!-- Dashboard Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h4>Total Students</h4>
                        <div class="stat-value" id="stat-students">--</div>
                    </div>
                    <div class="stat-icon primary">👥</div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h4>Classes</h4>
                        <div class="stat-value" id="stat-classes">--</div>
                    </div>
                    <div class="stat-icon success">🏫</div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h4>Fees Collected</h4>
                        <div class="stat-value" id="stat-fees">--</div>
                    </div>
                    <div class="stat-icon warning">💰</div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h4>Pending Fees</h4>
                        <div class="stat-value" id="stat-pending">--</div>
                    </div>
                    <div class="stat-icon danger">⚠️</div>
                </div>
            </div>

            <!-- Recent Activity Table -->
            <div class="card">
                <div class="card-header">
                    <h3>Recent Students</h3>
                    <a href="students.html" class="btn" style="background:#eee; padding:5px 10px; font-size:14px; text-decoration:none; color:#333; border-radius:5px;">View All</a>
                </div>
                <div class="table-responsive">
                    <table id="recentStudentsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Contact</th>
                                <th>Date Joined</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="5" align="center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- API and Logic scripts -->
    <script src="js/api.js"></script>
    <script>
        // Ensure user is logged in
        const user = Auth.check();
        document.getElementById('adminName').textContent = user.username;

        // Load Dashboard Data
        async function loadDashboard() {
            try {
                // Fetch Students
                const students = await Students.getAll();
                document.getElementById('stat-students').textContent = students.length;
                
                // Calculate unique classes
                const classes = new Set(students.map(s => s.class));
                document.getElementById('stat-classes').textContent = classes.size;

                // Load recent 5 students
                const tbody = document.querySelector('#recentStudentsTable tbody');
                tbody.innerHTML = '';
                
                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" align="center">No students found.</td></tr>';
                } else {
                    const recentStudents = students.slice(-5).reverse();
                    recentStudents.forEach(student => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>#${student.student_id}</td>
                            <td><strong>${student.name}</strong></td>
                            <td>${student.class}</td>
                            <td>${student.contact || 'N/A'}</td>
                            <td>${student.admission_date || 'N/A'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }

                // Fetch Fees Data
                const feesData = await Fees.getAll();
                let collected = 0;
                let pending = 0;
                
                feesData.forEach(f => {
                    collected += f.paid_amount;
                    pending += (f.total_amount - f.paid_amount);
                });
                
                document.getElementById('stat-fees').textContent = '$' + collected.toFixed(2);
                document.getElementById('stat-pending').textContent = '$' + pending.toFixed(2);

            } catch (error) {
                console.error("Failed to load dashboard data", error);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
