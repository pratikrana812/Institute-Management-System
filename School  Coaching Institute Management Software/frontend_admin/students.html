<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Institute Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>InstiManage</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i>📊</i> Dashboard</a></li>
                <li><a href="students.html" class="active"><i>👩‍🎓</i> Students</a></li>
                <li><a href="fees.html"><i>💳</i> Fees</a></li>
                <li><a href="attendance.html"><i>📅</i> Attendance</a></li>
                <li><a href="exams.html"><i>📝</i> Exams</a></li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h2>Manage Students</h2>
                </div>
                <div class="header-user">
                    <span id="adminName"></span>
                    <button class="logout-btn" onclick="Auth.logout()">Logout</button>
                </div>
            </header>

            <div class="card">
                <div class="card-header">
                    <h3>Student List</h3>
                    <button class="btn btn-primary" onclick="openAddStudentModal()" style="width:auto">+ Add Student</button>
                </div>
                <div class="table-responsive">
                    <table id="studentsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Contact</th>
                                <th>Address</th>
                                <th>Admission Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="7" align="center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Student Modal -->
    <div class="modal" id="studentModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeStudentModal()">&times;</span>
            <h3 style="margin-bottom:20px;" id="modalTitle">Add New Student</h3>
            <form id="studentForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="s_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Class/Grade</label>
                    <input type="text" id="s_class" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="s_contact" class="form-control">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="s_address" class="form-control">
                </div>
                <div class="form-group">
                    <label>Admission Date</label>
                    <input type="date" id="s_date" class="form-control">
                </div>
                <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="s_login" checked>
                    <label for="s_login" style="margin:0;">Create Web/App Login for Student</label>
                </div>
                <button type="submit" class="btn btn-primary">Save Student</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script>
        const user = Auth.check();
        document.getElementById('adminName').textContent = user.username;

        const modal = document.getElementById('studentModal');
        const form = document.getElementById('studentForm');

        function openAddStudentModal() {
            form.reset();
            document.getElementById('modalTitle').textContent = 'Add New Student';
            modal.classList.add('active');
        }

        function closeStudentModal() {
            modal.classList.remove('active');
        }

        async function loadStudents() {
            try {
                const students = await Students.getAll();
                const tbody = document.querySelector('#studentsTable tbody');
                tbody.innerHTML = '';
                
                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" align="center">No students found.</td></tr>';
                } else {
                    students.forEach(student => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>#${student.student_id}</td>
                            <td><strong>${student.name}</strong></td>
                            <td>${student.class}</td>
                            <td>${student.contact || 'N/A'}</td>
                            <td>${student.address || 'N/A'}</td>
                            <td>${student.admission_date || 'N/A'}</td>
                            <td>
                                <button class="action-btn btn-delete" onclick="deleteStudent(${student.student_id})">Delete</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error("Failed to load students", error);
            }
        }

        async function deleteStudent(id) {
            if(confirm('Are you sure you want to delete this student?')) {
                try {
                    await Students.delete(id);
                    loadStudents();
                } catch(err) {
                    alert(err.message);
                }
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('s_name').value,
                class: document.getElementById('s_class').value,
                contact: document.getElementById('s_contact').value,
                address: document.getElementById('s_address').value,
                admission_date: document.getElementById('s_date').value,
                create_login: document.getElementById('s_login').checked
            };

            try {
                await Students.create(data);
                closeStudentModal();
                loadStudents(); // Reload table
            } catch (error) {
                alert(error.message);
            }
        });

        loadStudents();
    </script>
</body>
</html>
