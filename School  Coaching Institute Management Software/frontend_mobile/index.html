<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Login</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body class="auth-page">

    <div class="auth-header">
        <h1>InstiManage App</h1>
        <p>Student Portal</p>
    </div>

    <div class="auth-card">
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" class="form-control" placeholder="Student ID or Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <div id="errorMessage" style="color: #ffcccc; margin-bottom: 15px; text-align: center; display: none;"></div>
            <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('studentUser')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            
            btn.textContent = 'Verifying...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // If using localhost from emulator, 10.0.2.2 usually maps to localhost. 
                // Currently API uses the network IP.
                await AppAuth.login(
                    document.getElementById('username').value, 
                    document.getElementById('password').value
                );
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
